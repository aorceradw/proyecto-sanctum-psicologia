# Configuración de Apache para Sanctum
# Coloca este archivo en: /etc/apache2/sites-available/sanctum.conf

<VirtualHost *:80>
    ServerName tu-dominio.com
    ServerAlias www.tu-dominio.com
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/sanctum_error.log
    CustomLog ${APACHE_LOG_DIR}/sanctum_access.log combined
    
    # Habilitar módulos necesarios
    # sudo a2enmod proxy
    # sudo a2enmod proxy_http
    # sudo a2enmod rewrite
    
    # ============================================
    # OPCIÓN 1: Raíz de dominio (/)
    # ============================================
    # Descomentar si quieres que Sanctum sea el sitio principal
    # ProxyPreserveHost On
    # ProxyPass / http://localhost:3001/
    # ProxyPassReverse / http://localhost:3001/
    
    # Reescrituras para React Router
    # <Directory /var/www/sanctum>
    #     RewriteEngine On
    #     RewriteBase /
    #     RewriteRule ^index\.html$ - [L]
    #     RewriteCond %{REQUEST_FILENAME} !-f
    #     RewriteCond %{REQUEST_FILENAME} !-d
    #     RewriteRule . index.html [L]
    # </Directory>
    
    # ============================================
    # OPCIÓN 2: Subruta (/sanctum/)
    # ============================================
    # Descomentar para servir en subruta
    ProxyPreserveHost On
    ProxyPass /sanctum/ http://localhost:3001/sanctum/
    ProxyPassReverse /sanctum/ http://localhost:3001/sanctum/
    
    # Reescrituras para React Router en subruta
    <Directory /var/www/sanctum/sanctum>
        RewriteEngine On
        RewriteBase /sanctum/
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . index.html [L]
    </Directory>
    
    # ============================================
    # Headers de seguridad (recomendado)
    # ============================================
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-XSS-Protection "1; mode=block"
    Header set Referrer-Policy "strict-origin-when-cross-origin"
    
    # ============================================
    # CORS (si es necesario desde otros dominios)
    # ============================================
    # Header set Access-Control-Allow-Origin "*"
    # Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    # Header set Access-Control-Allow-Headers "Content-Type, Authorization"
    
    # Opcionalmente, usar SSL (Let's Encrypt recomendado)
    # SSLEngine on
    # SSLCertificateFile /etc/ssl/certs/tu-cert.crt
    # SSLCertificateKeyFile /etc/ssl/private/tu-key.key
    # Redirect permanent / https://tu-dominio.com/
</VirtualHost>

